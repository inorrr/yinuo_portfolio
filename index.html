<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yinuo Zhao</title>
    <meta
      name="description"
      content="A minimalist personal landing page with hanging kinetic letters."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="landing" aria-labelledby="site-title">
      <canvas
        id="kinetic-name"
        class="kinetic-canvas"
        aria-hidden="true"
      ></canvas>

      <div class="sr-only">
        <h1 id="site-title">Yinuo Zhao</h1>
        <p>
          Full-screen landing page with suspended letters that gently swing and
          react to pointer movement.
        </p>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
